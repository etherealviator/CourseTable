name: Build APK
on:
  push:
    branches: [main, master, v2]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          ls -la ${ANDROID_HOME}/platforms/ 2>/dev/null || echo "no platforms dir"
          # accept licenses
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null 2>&1 || true
          # install required SDK components for Expo SDK 56 (compileSdk 36)
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools" 2>&1 | tail -5

      - name: Prebuild Android
        run: npx expo prebuild --platform android --no-install

      - name: Setup Gradle
        working-directory: android
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> gradle.properties

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: course-table-apk
          path: android/app/build/outputs/apk/release/*.apk
